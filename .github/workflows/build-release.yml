name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  PLUGIN_NAME: HelloFellowHuman
  SOLUTION_NAME: HelloFellowHuman
  INTERNAL_NAME: HelloFellowHuman
  RELEASE_DIR: HelloFellowHuman\HelloFellowHuman\bin\x64\Release\HelloFellowHuman

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev\"

      - name: Build
        run: |
          dotnet restore -r win ${{ env.SOLUTION_NAME }}.sln
          dotnet build --configuration Release
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: true

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-artifact
          path: ${{ env.RELEASE_DIR }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-artifact
          path: artifact

      - name: Read version from csproj
        id: get_version
        run: |
          VERSION=$(sed -n 's|.*<Version>\(.*\)</Version>.*|\1|p' HelloFellowHuman/HelloFellowHuman.csproj | head -n 1)
          if [ -z "$VERSION" ]; then
            echo "Failed to read <Version> from HelloFellowHuman.csproj"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Ensure tag exists
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          git fetch --tags
          if ! git rev-parse "v$VERSION" >/dev/null 2>&1; then
            git config user.name "github-actions"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "v$VERSION"
            git push origin "v$VERSION"
          fi

      - name: Create latest.zip
        run: |
          cd artifact
          zip -r ../latest.zip .
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            latest.zip
            artifact/${{ env.INTERNAL_NAME }}.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}