name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install Dalamud runtime
        uses: Blooym/setup-dalamud@v1
        with:
          branch: api15

      - name: Restore
        run: dotnet restore .\HelloFellowHuman.sln

      - name: Build (Release)
        run: dotnet build .\HelloFellowHuman.sln -c Release --no-restore -p:Platform=x64

      - name: Upload packaged plugin zip
        uses: actions/upload-artifact@v4
        with:
          name: HelloFellowHuman-latest
          path: .\HelloFellowHuman\bin\x64\Release\HelloFellowHuman\latest.zip
          if-no-files-found: error
