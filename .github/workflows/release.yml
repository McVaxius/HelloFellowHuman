name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install Dalamud runtime
        uses: Blooym/setup-dalamud@v1
        with:
          branch: release

      - name: Restore
        run: dotnet restore .\HelloFellowHuman.sln

      - name: Build (Release)
        run: dotnet build .\HelloFellowHuman.sln -c Release --no-restore

      - name: Verify packaged zip exists
        run: |
          $zip = Join-Path $env:GITHUB_WORKSPACE "HelloFellowHuman/bin/x64/Release/HelloFellowHuman/latest.zip"
          if (-not (Test-Path $zip)) {
            Write-Error "Expected package not found: $zip"
            exit 1
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            HelloFellowHuman/bin/x64/Release/HelloFellowHuman/latest.zip
